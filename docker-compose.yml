version: '3.8'

services:
  # Redis service required for BullMQ queues/workers
  redis:
    image: redis:7-alpine
    container_name: sera_redis
    restart: always
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

  # WhatsApp Second Brain App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sera_brain_app
    restart: always
    depends_on:
      - redis
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TIMEZONE=Asia/Colombo
      - DATABASE_URL=mongodb://mongo:fvquwo6ronfruznx@test-memoryapp-whqlxd:27017/sera_brain?authSource=admin&directConnection=true
      - REDIS_URL=redis://redis:6379
      - OPENROUTER_API_KEY=your-openrouter-api-key-here
      - AI_MODEL=google/gemini-2.0-flash-exp:free
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      - GOOGLE_REDIRECT_URI=http://localhost:3000/oauth2callback
      - GOOGLE_REFRESH_TOKEN=
      - USER_EMAIL=
    volumes:
      # Crucial: Persists WhatsApp login keys so you don't scan QR on every restart/deploy
      - ./auth_info:/usr/src/app/auth_info

volumes:
  redisdata:
